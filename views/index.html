<!-- Блок статуса сервера -->
<div class="server-status-section">
    <h2>🎮 Статус моего сервера</h2>
    <div id="serverStatus" class="status-card">
        <div class="loading">Загрузка статуса...</div>
    </div>
</div>

<style>
.server-status-section {
    margin: 2rem 0;
    padding: 1.5rem;
    background: #16213e;
    border-radius: 10px;
    border: 1px solid #0f3460;
}

.status-card {
    display: flex;
    align-items: center;
    gap: 2rem;
    padding: 1rem;
}

.status-online {
    color: #4caf50;
    font-size: 1.2rem;
}

.status-offline {
    color: #f44336;
    font-size: 1.2rem;
}

.player-count {
    font-size: 2rem;
    font-weight: bold;
    color: #e94560;
}

.server-info {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 1rem;
    width: 100%;
}

.info-item {
    text-align: center;
    padding: 1rem;
    background: #1a1a2e;
    border-radius: 8px;
}

.info-label {
    font-size: 0.9rem;
    opacity: 0.7;
    margin-bottom: 0.5rem;
}

.info-value {
    font-size: 1.2rem;
    font-weight: bold;
    color: #e94560;
}
</style>

<script>
// Добавьте этот код в ваш существующий JavaScript
async function loadServerStatus() {
    try {
        // Замените НА_АДРЕС_ВАШЕГО_СЕРВЕРА на реальный IP вашего Minecraft сервера
        const response = await fetch('https://api.mcsrvstat.us/2/НА_АДРЕС_ВАШЕГО_СЕРВЕРА');
        const data = await response.json();
        
        const statusDiv = document.getElementById('serverStatus');
        
        if (data.online) {
            statusDiv.innerHTML = `
                <div class="status-online">✅ Сервер онлайн</div>
                <div class="server-info">
                    <div class="info-item">
                        <div class="info-label">Игроки онлайн</div>
                        <div class="info-value">${data.players.online}/${data.players.max}</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">Версия</div>
                        <div class="info-value">${data.version || 'Неизвестно'}</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">MOTD</div>
                        <div class="info-value">${data.motd?.clean?.[0] || 'Нет'}</div>
                    </div>
                </div>
            `;
            
            // Если есть список игроков, показываем его
            if (data.players.list && data.players.list.length > 0) {
                statusDiv.innerHTML += `
                    <div style="margin-top: 1rem; padding: 1rem; background: #1a1a2e; border-radius: 8px;">
                        <div class="info-label">Игроки онлайн:</div>
                        <div>${data.players.list.join(', ')}</div>
                    </div>
                `;
            }
        } else {
            statusDiv.innerHTML = '<div class="status-offline">❌ Сервер оффлайн</div>';
        }
    } catch (error) {
        console.error('Ошибка загрузки статуса:', error);
        document.getElementById('serverStatus').innerHTML = 
            '<div class="status-offline">❌ Не удалось получить статус</div>';
    }
}

// Загружаем статус при загрузке страницы и каждые 30 секунд
document.addEventListener('DOMContentLoaded', () => {
    loadServerStatus();
    setInterval(loadServerStatus, 30000); // Обновляем каждые 30 секунд
});
</script>
