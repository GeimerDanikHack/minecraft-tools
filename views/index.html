<!-- Блок статуса сервера -->
<div class="server-status-section">
    <h2>🎮 Статус моего сервера</h2>
    <div id="serverStatus" class="status-card">
        <div class="loading">Загрузка статуса...</div>
    </div>
</div>

<style>
.server-status-section {
    margin: 2rem 0;
    padding: 1.5rem;
    background: #16213e;
    border-radius: 10px;
    border: 1px solid #0f3460;
}

.status-card {
    display: flex;
    flex-direction: column;
    gap: 1rem;
    padding: 1rem;
}

.status-online {
    color: #4caf50;
    font-size: 1.2rem;
    font-weight: bold;
}

.status-offline {
    color: #f44336;
    font-size: 1.2rem;
    font-weight: bold;
}

.player-count {
    font-size: 2rem;
    font-weight: bold;
    color: #e94560;
}

.server-info {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 1rem;
    width: 100%;
}

.info-item {
    text-align: center;
    padding: 1rem;
    background: #1a1a2e;
    border-radius: 8px;
}

.info-label {
    font-size: 0.9rem;
    opacity: 0.7;
    margin-bottom: 0.5rem;
}

.info-value {
    font-size: 1.2rem;
    font-weight: bold;
    color: #e94560;
}

.player-list {
    margin-top: 1rem;
    padding: 1rem;
    background: #1a1a2e;
    border-radius: 8px;
}

.player-list-title {
    color: #e94560;
    margin-bottom: 0.5rem;
}

.player-names {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
}

.player-name {
    background: #0f3460;
    padding: 0.3rem 0.8rem;
    border-radius: 15px;
    font-size: 0.9rem;
}
</style>

<script>
// Функция загрузки статуса сервера
async function loadServerStatus() {
    try {
        // Используем API вашего сервера
        const response = await fetch('192.168.100.231:25565');
        const data = await response.json();
        
        const statusDiv = document.getElementById('serverStatus');
        
        if (data.online) {
            let playersHtml = '';
            if (data.players.list && data.players.list.length > 0) {
                playersHtml = `
                    <div class="player-list">
                        <div class="player-list-title">👥 Игроки онлайн (${data.players.list.length}):</div>
                        <div class="player-names">
                            ${data.players.list.map(name => `<span class="player-name">${name}</span>`).join('')}
                        </div>
                    </div>
                `;
            }
            
            statusDiv.innerHTML = `
                <div class="status-online">✅ Сервер онлайн</div>
                <div class="server-info">
                    <div class="info-item">
                        <div class="info-label">Игроки онлайн</div>
                        <div class="info-value">${data.players.online}/${data.players.max}</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">Версия</div>
                        <div class="info-value">${data.version || 'Неизвестно'}</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">Задержка</div>
                        <div class="info-value">${data.latency || 0} мс</div>
                    </div>
                </div>
                ${playersHtml}
            `;
        } else {
            statusDiv.innerHTML = '<div class="status-offline">❌ Сервер оффлайн</div>';
        }
    } catch (error) {
        console.error('Ошибка загрузки статуса:', error);
        document.getElementById('serverStatus').innerHTML = 
            '<div class="status-offline">❌ Не удалось получить статус</div>';
    }
}

// Загружаем при загрузке страницы и каждые 30 секунд
document.addEventListener('DOMContentLoaded', () => {
    loadServerStatus();
    setInterval(loadServerStatus, 30000);
});
</script>
